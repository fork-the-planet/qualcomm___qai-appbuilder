# Generated by tools/build/factory_compiler from config/exec_profiles\git.json.
# Static default — do not edit at runtime; edit the source file in the repo and re-run the migrator.

name = "git"
description = "Git 版本控制（PortableGit）。管控 git 命令中危险但可能合法的操作。(1) 危险参数（ask_args，命中即弹窗）：--force / -f（强推覆盖远端历史）、--exec / --upload-pack / --receive-pack（可指定任意可执行体，等价远程命令执行）、-c core.sshCommand= / -c core.hooksPath= / -c core.fsmonitor=（临时注入可执行钩子/命令）、-c protocol.ext.allow=（放开 ext 协议）。(2) 破坏性子命令（ask_rules，精确到子命令+flag 组合，避免误伤日常操作）：reset --hard/--keep、clean -f*、checkout . / --（丢工作区改动）、stash/rebase/merge/cherry-pick/revert/restore（会移走/重写未提交改动或历史）。安全操作如 reset --soft、checkout -b、clean -n、status/log/diff 不触发。命中即弹窗让用户拍板（ASK），不硬拒也不放行。rm -rf 等必死命令由 PatternFileBroker 默认硬拒，不在此重复。io_constraints 已移除：git 命令的路径参数几乎都是仓库内相对路径，绝对前缀无法匹配，会误拦 git add/checkout 等高频命令。文件操作保护交给 native OS hook。"
ask_args = ["--force", "-f", "--exec", "--upload-pack", "--receive-pack", "-c core.sshCommand=", "-c core.hooksPath=", "-c core.fsmonitor=", "-c protocol.ext.allow="]
ask_rules = [{ subcommand = "reset", any_flags = ["--hard", "--keep"], reason = "git reset --hard / --keep 会丢弃工作区/暂存区的未提交改动，不可逆。请确认后再执行。" }, { subcommand = "clean", any_flags = ["-f", "-fd", "-fdx", "-fx", "-df", "-xdf", "-d", "--force"], reason = "git clean -f 会永久删除未跟踪的文件/目录，不可逆。请确认后再执行。" }, { subcommand = "checkout", positional_any = [".", "--"], reason = "git checkout . / checkout -- <path> 会用 HEAD 覆盖工作区改动，丢弃未提交内容。请确认后再执行。" }, { subcommand = "stash", reason = "git stash 会移走所有未提交改动；pop/apply 冲突时状态易错乱。请确认后再执行。" }, { subcommand = "rebase", reason = "git rebase 会重写提交历史，可能丢失或错乱提交。请确认后再执行。" }, { subcommand = "merge", reason = "git merge 会改变当前分支历史/工作区，可能产生冲突或非预期合并。请确认后再执行。" }, { subcommand = "cherry-pick", reason = "git cherry-pick 会把其它提交应用到当前分支，可能产生冲突。请确认后再执行。" }, { subcommand = "revert", reason = "git revert 会创建撤销提交，改变分支内容。请确认后再执行。" }, { subcommand = "restore", reason = "git restore 会用其它版本覆盖工作区/暂存区文件，丢弃改动。请确认后再执行。" }]

[match]
binary_globs = ["git", "git.exe", "**/git/bin/git.exe", "**/git.exe"]
