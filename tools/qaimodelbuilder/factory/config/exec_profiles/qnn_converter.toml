name = "qnn_converter"
description = "QNN / QAIRT 模型转换与生成工具（qnn-onnx-converter / qnn-model-lib-generator / qairt-converter / qairt-quantizer 等）。ask_args 管控 --debug_host / --remote_url：这两个参数会让转换器连向外部主机，可能把模型/数据外泄，命中即弹窗让用户确认。不用已废弃的 allowed_args（原先只列 5 个 flag，会误伤真实的十几个合法转换参数）。io_constraints 已移除：output_dirs 的写保护由 native OS hook（guard64.dll）在文件系统层精确拦截（C:/Qualcomm SDK 树 op-mask READ+EXECUTE 无 WRITE），比命令参数层解析更可靠且无法被绕过。"
ask_args = ["--debug_host", "--remote_url"]

[match]
binary_globs = ["qnn-*-converter", "qnn-*-generator", "qairt-converter", "qairt-quantizer", "**/qnn-*", "**/qairt-*"]
