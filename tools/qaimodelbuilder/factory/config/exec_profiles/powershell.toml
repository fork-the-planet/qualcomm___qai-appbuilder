name = "powershell"
description = "PowerShell / pwsh 脚本引擎护栏。powershell 是通用脚本引擎，普通用法（Get-ChildItem、探测目录、读文件等）是正常操作，不应一律弹窗。只对真正危险的参数弹窗：-EncodedCommand（执行 Base64 编码的任意代码，是混淆/绕过的标准手法）、-File（执行外部脚本文件，可能是恶意脚本）、Invoke-WebRequest/iwr/Invoke-Expression/iex（命令字符串里出现这些关键词，说明命令本身在做网络请求或动态执行代码）。普通的 powershell -Command 'Get-ChildItem' / powershell -NoProfile 等不触发。文件读写保护交给 native OS hook。"
ask_args = ["-EncodedCommand", "-EncodedC", "-Enc", "-File", "Invoke-WebRequest", "iwr", "Invoke-Expression", "iex", "DownloadString", "DownloadFile", "WebClient", "Net.WebClient"]

[match]
binary_globs = ["powershell", "powershell.exe", "**/powershell.exe", "pwsh", "pwsh.exe", "**/pwsh.exe"]
