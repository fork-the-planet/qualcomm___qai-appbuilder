name = "net_and_lolbins"
description = "网络/注册表/LOLBin 命令护栏：curl/wget（网络下载/外传）、reg（注册表持久化）、certutil/bitsadmin（LOLBin：合法系统程序被滥用做外传或下载）。这些程序的危险不在某个 flag，而在它们本身就能访问网络/改注册表——这些是 native 文件层（guard64.dll）根本 hook 不到的操作。ask_always=true：只要 binary 匹配就 ASK（不看参数），因为对这些程序而言 mere use 就是风险。powershell/pwsh 已移到独立 profile（powershell.toml），改为基于参数的 ask，避免每次 powershell 探测目录都弹窗。"
ask_always = true

[match]
binary_globs = ["curl", "curl.exe", "**/curl.exe", "wget", "wget.exe", "**/wget.exe", "reg", "reg.exe", "**/reg.exe", "certutil", "certutil.exe", "**/certutil.exe", "bitsadmin", "bitsadmin.exe", "**/bitsadmin.exe"]
