# Generated by tools/build/factory_compiler from config/exec_profiles\unix_tools.json.
# Static default — do not edit at runtime; edit the source file in the repo and re-run the migrator.

name = "unix_tools"
description = "PortableGit 自带的 Unix 工具（grep/sed/awk/find/diff/patch 等，位于 git/usr/bin）。这些是通用文本处理工具，路径参数几乎都是相对路径，io_constraints 的绝对前缀无法匹配相对路径，会误拦正常操作。文件读写保护交给 native OS hook（guard64.dll）在文件系统层精确拦截。保留 ask_args=[\"--exec\"] 防止 find/xargs 的任意命令执行。"
ask_args = ["--exec"]

[match]
binary_globs = ["**/git/usr/bin/*.exe"]
