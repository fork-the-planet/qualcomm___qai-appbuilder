name = "python"
description = "Python 解释器。exec_broker 管不住 python 的真实风险——危险主要藏在 -c 后的代码正文与 script.py 脚本内容里，那属于代码内容而非命令行 flag，本层无法审查。因此本 profile 不设 ask_args 也不设 io_constraints（io_constraints 对 python 这种通用工具意义不大：相对路径无法匹配绝对前缀、且会误拦正常的工作区文件读取）。文件读写的保护完全交给 native OS hook（guard64.dll），它在文件系统层精确拦截，不需要命令行解析，任何程序都逃不过。"

[match]
binary_globs = ["python", "python.exe", "python3", "python3.exe", "**/python*.exe"]
