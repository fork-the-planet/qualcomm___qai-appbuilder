# Taxonomy rule database for backend.app_builder.taxonomy_classifier.
# Edit this file when you want to teach the rule classifier new keywords.
#
# Structure:
#   tasks:    map<task-id, { keywords: [...] }>  -- precise keyword -> task (confidence 0.95)
#   groups:   map<group-id, [keywords]>          -- group fallback (confidence 0.6) when no
#                                                    task-level rule matches.
#
# Rules:
#   1. A keyword must NOT appear in two different tasks. Loader asserts uniqueness.
#   2. Use single-word, distinctive tokens. Do NOT include short generic tokens like
#      `vit` / `swin` / `bert` at the task level -- those collide across tasks
#      (e.g. `mobilevit`, `levit`, LLaVA's ViT encoder, BERT-conditioned MeloTTS).
#      Put them in `groups.computer-vision` so the LLM has the final say.
#   3. Word boundaries are enforced by the classifier ((?<![a-z0-9]) ... (?![a-z0-9])),
#      so multi-letter keywords are matched as whole tokens after _normalize_name.
#
# Spec: docs/30-ui-ux/model-taxonomy-redesign.md (section 6.1).

tasks:
